services:
  - type: web
    name: campus-mcp-library
    env: node
    rootDir: mcp-servers/library
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3001

  - type: web
    name: campus-mcp-cafeteria
    env: node
    rootDir: mcp-servers/cafeteria
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3002

  - type: web
    name: campus-mcp-events
    env: node
    rootDir: mcp-servers/events
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3003

  - type: web
    name: campus-mcp-academics
    env: node
    rootDir: mcp-servers/academics
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3004
